spring:
  datasource:
    url: jdbc:h2:mem:featureflags;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  cache:
    type: none

logging:
  level:
    com.ffs.server.mapper: DEBUG
    com.ffs.server.service: DEBUG
    com.ffs.server.config: DEBUG
