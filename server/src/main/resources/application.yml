server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/featureflags}
    username: ${SPRING_DATASOURCE_USERNAME:ffuser}
    password: ${SPRING_DATASOURCE_PASSWORD:ffpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 86400000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ffs.server.model.entity
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /api-docs

logging:
  pattern:
    console: '{"ts":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","logger":"%logger","msg":"%msg","requestId":"%X{requestId}"}%n'
  level:
    org.springframework.cache: DEBUG
    com.ffs.server.mapper: DEBUG
